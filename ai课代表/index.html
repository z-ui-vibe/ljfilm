<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人主页 · 简介 · 摄影</title>
  <style>
    /* ========== 一、CSS 变量（便于统一改主题色、圆角等） ========== */
    :root {
      --color-bg: #fafafa;
      --color-surface: #ffffff;
      --color-text: #1d1d1f;
      --color-text-muted: #6e6e73;
      --color-accent: #1d1d1f;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.12);
      --transition: 0.25s ease;
    }

    /* ========== 二、基础重置与字体 ========== */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 17px;
      line-height: 1.5;
      color: var(--color-text);
      background: var(--color-bg);
    }

    /* ========== 三、Header 导航 ========== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 250, 250, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      padding: 1rem 2rem;
      transition: var(--transition);
    }
    .header-inner {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .site-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--color-text);
      text-decoration: none;
    }
    nav {
      display: flex;
      gap: 1.5rem;
    }
    nav a {
      color: var(--color-text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color var(--transition);
    }
    nav a:hover { color: var(--color-accent); }

    /* ========== 四、主内容区通用 ========== */
    main { max-width: 980px; margin: 0 auto; padding: 0 2rem 4rem; }

    /* ========== 五、Hero 个人简介区 ========== */
    #intro {
      padding: 5rem 0 4rem;
      text-align: center;
    }
    .hero-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    .hero-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .hero-subtitle {
      font-size: 1.1rem;
      color: var(--color-text-muted);
      margin: 0 0 1.5rem;
    }
    .hero-bio {
      max-width: 560px;
      margin: 0 auto;
      color: var(--color-text-muted);
      font-size: 1rem;
    }

    .section-title {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 2rem;
      letter-spacing: -0.02em;
    }

    /* ========== 六、胶片摄影区：分类 + 画廊 ========== */
    #gallery {
      padding: 4rem 0;
    }
    /* 分类卡片网格（首页看到的「街头」「山景」等） */
    .gallery-categories {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .category-card {
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: pointer;
      background: var(--color-surface);
    }
    .category-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }
    /* 收藏分类特殊样式 */
    .category-card.is-liked-category {
      background: linear-gradient(135deg, #ff2d55 0%, #ff5e3a 100%);
      color: white;
    }
    .category-card.is-liked-category span {
      color: white;
    }
    .category-card.is-liked-category .liked-heart {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    .category-card.is-liked-category .liked-heart svg {
      width: 48px;
      height: 48px;
      fill: white;
    }
    .category-card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .category-card span {
      display: block;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 500;
      color: var(--color-text);
    }
    /* 分类内的画廊视图（点进某个分类后看到的多张照片） */
    .gallery-photos-view {
      display: none;
    }
    .gallery-photos-view.is-open {
      display: block;
    }
    .gallery-back-btn {
      margin-bottom: 1.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      color: var(--color-text-muted);
      background: var(--color-surface);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: var(--radius);
      cursor: pointer;
      transition: color var(--transition), background var(--transition);
    }
    .gallery-back-btn:hover {
      color: var(--color-text);
      background: #f0f0f0;
    }
    .gallery-photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .gallery-photos-grid li {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .gallery-photos-grid li:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }
    .gallery-item {
      display: block;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .gallery-item span {
      display: block;
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
      color: var(--color-text-muted);
      background: var(--color-surface);
    }

    /* ========== 八、照片点赞按钮 ========== */
    .like-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, background 0.2s ease;
      z-index: 10;
    }
    .like-btn:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 1);
    }
    .like-btn:active {
      transform: scale(0.95);
    }
    .like-btn svg {
      width: 20px;
      height: 20px;
      transition: fill 0.2s ease;
    }
    /* 未点赞状态 - 空心灰心 */
    .like-btn:not(.is-liked) svg {
      fill: none;
      stroke: #6e6e73;
      stroke-width: 2;
    }
    /* 已点赞状态 - 实心红心 */
    .like-btn.is-liked svg {
      fill: #ff2d55;
      stroke: #ff2d55;
      stroke-width: 2;
    }

    /* ========== 九、Lightbox 遮罩 ========== */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--transition), visibility var(--transition);
    }
    .lightbox.is-open {
      opacity: 1;
      visibility: visible;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: var(--radius);
    }
    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 44px;
      height: 44px;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 1.5rem;
      border-radius: 50%;
      cursor: pointer;
      transition: background var(--transition);
    }
    .lightbox-close:hover { background: rgba(255, 255, 255, 0.25); }

    /* ========== 九、Footer ========== */
    footer {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.9rem;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
    }

    /* ========== 十、响应式：平板与手机 ========== */
    @media (max-width: 768px) {
      header { padding: 0.75rem 1rem; }
      .header-inner { flex-direction: column; gap: 0.75rem; align-items: stretch; }
      nav { justify-content: center; flex-wrap: wrap; gap: 1rem; }
      main { padding: 0 1rem 3rem; }
      #intro { padding: 3rem 0 2.5rem; }
      .hero-title { font-size: 1.75rem; }
      .section-title { font-size: 1.5rem; margin-bottom: 1.5rem; }
      .gallery-categories { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .gallery-photos-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    }
    @media (max-width: 480px) {
      .gallery-categories { grid-template-columns: 1fr; }
      .gallery-photos-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <header>
    <div class="header-inner">
      <a href="#" class="site-title">个人主页</a>

  <main>

      <p class="hero-bio">
        在这里写一段个人简介。可以介绍你的职业、爱好、在做的事情，
        保持简洁即可。风格参考苹果/特斯拉：留白多、信息清晰。
      </p>
    </section>

    <!-- 区块：胶片摄影（分类 → 点进后为画廊，每张可放大） -->

      <ul class="gallery-categories" id="galleryCategories"></ul>
      <!-- 某个分类下的多张照片（点进分类后显示，每张点击可放大） -->
      <div class="gallery-photos-view" id="galleryPhotosView">
        <button type="button" class="gallery-back-btn" id="galleryBackBtn">← 返回分类</button>
        <ul class="gallery-photos-grid" id="galleryPhotosGrid"></ul>
      </div>
    </section>
  </main>

  <!-- 区块：页脚 -->
  <footer>
    <p>© 2025 个人主页 · 用 HTML + CSS + JavaScript 制作</p>
  </footer>

    <img src="" alt="" id="lightboxImg">
  </div>

    // ========== 数据加载（优先从 API 获取，失败则使用本地数据） ==========
    async function loadGalleryDataFromAPI() {
      try {
        const response = await fetch('/api/get-gallery');
        const result = await response.json();
        if (result.success && result.data && result.data.categories) {
          return result.data.categories;
        }
      } catch (error) {
        console.log('API 获取失败，使用本地数据');
      }
      // API 失败，返回本地数据
      return galleryData;
    }

    // ========== 二、渲染分类卡片（首页看到的「街头」「山景」等） ==========
    var galleryCategoriesEl = document.getElementById('galleryCategories');
    var galleryPhotosViewEl = document.getElementById('galleryPhotosView');
    var galleryPhotosGridEl = document.getElementById('galleryPhotosGrid');

    function renderCategories() {
      galleryCategoriesEl.innerHTML = '';
      
      // 先添加「收藏」分类卡片（特殊分类，ID 为 __liked__）
      var likedCount = Object.keys(getLikedPhotos()).length;
      var likedLi = document.createElement('li');
      likedLi.className = 'category-card is-liked-category';
      likedLi.setAttribute('data-category-id', '__liked__');
      likedLi.innerHTML = '<div class="liked-heart"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div><span>收藏 (' + likedCount + ')</span>';
      galleryCategoriesEl.appendChild(likedLi);
      
      // 再添加普通分类
      galleryData.forEach(function (cat) {
        var li = document.createElement('li');
        li.className = 'category-card';
        li.setAttribute('data-category-id', cat.id);
        li.innerHTML = '<img src="' + cat.cover + '" alt="' + cat.name + '"><span>' + cat.name + '</span>';
        galleryCategoriesEl.appendChild(li);
      });
    }

    // ========== 点赞状态管理（使用 localStorage 持久化） ==========
    function getLikedPhotos() {
      var data = localStorage.getItem('likedPhotos');
      return data ? JSON.parse(data) : {};
    }

    function saveLikedPhotos(likedMap) {
      localStorage.setItem('likedPhotos', JSON.stringify(likedMap));
    }

    function isPhotoLiked(photoId) {
      var liked = getLikedPhotos();
      return !!liked[photoId];
    }

    function togglePhotoLike(photoId) {
      var liked = getLikedPhotos();
      if (liked[photoId]) {
        delete liked[photoId];
      } else {
        liked[photoId] = true;
      }
      saveLikedPhotos(liked);
      return liked[photoId];
    }

    // ========== 三、点进分类：显示该分类下的多张照片（画廊） ==========
    function showCategoryGallery(categoryId) {
      var cat = galleryData.find(function (c) { return c.id === categoryId; });
      if (!cat) return;
      galleryPhotosGridEl.innerHTML = '';
      cat.photos.forEach(function (photo, index) {
        var li = document.createElement('li');
        var thumb = photo.src.replace('w=1200', 'w=400') || photo.src;
        var photoId = cat.id + '_' + index;
        var isLiked = isPhotoLiked(photoId);
        li.innerHTML = '<button type="button" class="like-btn ' + (isLiked ? 'is-liked' : '') + '" data-photo-id="' + photoId + '" aria-label="喜欢">' +
            '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>' +
          '</button>' +
          '<a href="' + photo.src + '" class="gallery-item" data-caption="' + (photo.caption || '') + '">' +
            '<img src="' + thumb + '" alt="' + (photo.caption || '') + '"><span>' + (photo.caption || '') + '</span></a>';
        galleryPhotosGridEl.appendChild(li);
      });
      galleryCategoriesEl.style.display = 'none';
      galleryPhotosViewEl.classList.add('is-open');
    }

    function hideCategoryGallery() {
      galleryPhotosViewEl.classList.remove('is-open');
      galleryCategoriesEl.style.display = '';
      // 返回分类列表时重新渲染，更新收藏数量
      renderCategories();
    }

    // ========== 四、显示所有点赞的照片（收藏夹） ==========
    function showLikedPhotosGallery() {
      var likedMap = getLikedPhotos();
      var likedIds = Object.keys(likedMap);
      
      galleryPhotosGridEl.innerHTML = '';
      
      if (likedIds.length === 0) {
        galleryPhotosGridEl.innerHTML = '<li style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--color-text-muted);">还没有收藏任何照片<br>点击照片上的爱心按钮来收藏</li>';
      } else {
        // 遍历所有分类，收集被点赞的照片
        galleryData.forEach(function (cat) {
          cat.photos.forEach(function (photo, index) {
            var photoId = cat.id + '_' + index;
            if (likedMap[photoId]) {
              var li = document.createElement('li');
              var thumb = photo.src.replace('w=1200', 'w=400') || photo.src;
              li.innerHTML = '<button type="button" class="like-btn is-liked" data-photo-id="' + photoId + '" aria-label="取消喜欢">' +
                  '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>' +
                '</button>' +
                '<a href="' + photo.src + '" class="gallery-item" data-caption="' + (photo.caption || '') + '">' +
                  '<img src="' + thumb + '" alt="' + (photo.caption || '') + '"><span>' + (photo.caption || '') + '</span></a>';
              galleryPhotosGridEl.appendChild(li);
            }
          });
        });
      }
      
      galleryCategoriesEl.style.display = 'none';
      galleryPhotosViewEl.classList.add('is-open');
    }

    // 异步初始化
    async function initGallery() {
      galleryData = await loadGalleryDataFromAPI();
      renderCategories();
    }
    
    initGallery();

    galleryCategoriesEl.addEventListener('click', function (e) {
      var card = e.target.closest('.category-card');
      if (!card) return;
      var categoryId = card.getAttribute('data-category-id');
      if (categoryId === '__liked__') {
        showLikedPhotosGallery();
      } else {
        showCategoryGallery(categoryId);
      }
    });
    document.getElementById('galleryBackBtn').addEventListener('click', hideCategoryGallery);

    // ========== 四、画廊内照片点击 → Lightbox 放大 ==========
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightboxImg');
    var lightboxClose = document.getElementById('lightboxClose');

    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt || '';
      lightbox.setAttribute('aria-hidden', 'false');
      lightbox.classList.add('is-open');
    }

    function closeLightbox() {
      lightbox.classList.remove('is-open');
      lightbox.setAttribute('aria-hidden', 'true');
    }

    galleryPhotosGridEl.addEventListener('click', function (e) {
      var likeBtn = e.target.closest('.like-btn');
      if (likeBtn) {
        e.stopPropagation();
        var photoId = likeBtn.getAttribute('data-photo-id');
        var isNowLiked = togglePhotoLike(photoId);
        likeBtn.classList.toggle('is-liked', isNowLiked);
        return;
      }

      var item = e.target.closest('a.gallery-item');
      if (!item) return;
      e.preventDefault();
      openLightbox(item.getAttribute('href'), item.getAttribute('data-caption') || '');
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox) closeLightbox();
    });

    // ========== 五、锚点平滑滚动 ==========
    document.querySelectorAll('nav a[href^="#"]').forEach(function (link) {
      link.addEventListener('click', function (e) {
        var href = this.getAttribute('href');
        if (href === '#') return;
        e.preventDefault();
        var target = document.querySelector(href);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  </script>

<!--
========== 学习说明（代码之后） ==========

【1. HTML 结构】
- header：顶部导航，仅「简介」「摄影」两个锚点。
- main：两个 <section>：#intro 个人简介；#gallery 胶片摄影。
- #gallery 内：.gallery-categories 为分类卡片列表（由 JS 根据 galleryData 渲染）；.gallery-photos-view 为点进某分类后的画廊视图，内含「返回分类」按钮和 .gallery-photos-grid（该分类下的多张照片，由 JS 渲染）。每张照片点击后通过 lightbox 放大。
- footer：版权信息。.lightbox 为全屏大图遮罩。

【2. CSS 样式逻辑】
- :root 变量、.section-title；.gallery-categories 为分类卡片网格，.category-card 悬停上浮；.gallery-photos-view 默认隐藏，.is-open 时显示；.gallery-photos-grid 为分类内照片网格；.gallery-item 点击打开 lightbox。响应式在 @media 中调整网格列数。

【3. JavaScript 核心逻辑】
- galleryData：按分类组织，每分类有 id、name、cover、photos（多张 { src, caption }）。renderCategories() 根据 galleryData 生成分类卡片；点击分类卡片调用 showCategoryGallery(id) 隐藏分类列表、渲染该分类的 photos 到 .gallery-photos-grid 并显示 .gallery-photos-view。「返回分类」调用 hideCategoryGallery()。.gallery-photos-grid 上使用事件委托：点击 .gallery-item 时 preventDefault 并 openLightbox(href, data-caption)。Lightbox 关闭逻辑不变。锚点平滑滚动保留。

========== 上传自己的照片 ==========
在 <script> 里的 galleryData 中修改：每个分类的 cover 为该分类封面图地址，photos 数组里每项为 { src: '大图地址', caption: '说明' }。可增删分类或每分类下的 photos 项。
-->
